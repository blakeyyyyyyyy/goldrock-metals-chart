name: Build & Deploy GoldRock Metals Chart

# Rebuilds the chart from the free keyless feeds and publishes to GitHub Pages
# twice a day — no Mac required, fully hands-off. Times are UTC (GitHub cron).
on:
  push:
    branches: [main]          # auto-deploy whenever the page is updated
  schedule:
    - cron: '15 11 * * *'   # ~06:15 ET — morning refresh
    - cron: '15 22 * * *'   # ~17:15 ET — after the NY spot close settles
  workflow_dispatch: {}       # lets you run it on demand from the Actions tab

permissions:
  contents: read
  pages: write
  id-token: write
  actions: write   # lets the keepalive step reset GitHub's 60-day cron-disable timer

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      # recent.json records each run's live prices so later runs can fill days the free
      # feeds lag on; series-lastgood.json lets a run publish even if a source dies.
      # Runners are throwaway, so persist both via the cache: every run saves under a
      # fresh key and restores the newest previous one. NOTE: editing this `path` list
      # changes the cache version and silently orphans all previous caches — expect one
      # cold run after any change here.
      - name: Restore recorded price snapshots
        uses: actions/cache@v4
        with:
          path: |
            recent.json
            series-lastgood.json
          key: recent-snapshots-${{ github.run_id }}
          restore-keys: |
            recent-snapshots-
      - name: Build the chart into ./public
        env:
          GOLDROCK_OUT_DIR: ${{ github.workspace }}/public
        run: |
          mkdir -p public
          python3 build/build.py
          # also publish the v2 lab build alongside (domain-locked, previewable via embed)
          GOLDROCK_TEMPLATE=template-v2.html GOLDROCK_INDEX=index-v2.html GOLDROCK_LOGO=logo-brand.png python3 build/build.py
          # social share card (og:image) — served next to the chart
          cp build/og.jpg public/og.jpg
      # GitHub disables cron schedules in repos with 60 days of no activity; re-enabling
      # the workflow via the API resets that timer, keeping the refresh truly hands-off.
      - name: Keep the schedule alive
        if: github.event_name == 'schedule'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh api -X PUT repos/${{ github.repository }}/actions/workflows/deploy.yml/enable || true
      # Dead-man's switch: if the refresh ever fails, push a notification straight to
      # Blake's phone via ntfy.sh (keyless — install the ntfy app and subscribe to the
      # topic below). The topic name is the only secret; keep it unguessable.
      - name: Failure alert to phone (ntfy.sh)
        if: failure()
        run: |
          curl -s -m 10 \
            -H "Title: GoldRock chart build FAILED" \
            -H "Priority: high" -H "Tags: warning,chart_with_downwards_trend" \
            -d "The scheduled price refresh failed. Check https://github.com/${{ github.repository }}/actions" \
            https://ntfy.sh/goldrock-metals-vxk49q2 || true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
